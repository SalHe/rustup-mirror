# .github/workflows/rust.yml
name: Rust Build & Windows Cross Compile
on: [push, pull_request] # 推送到分支/提交PR都触发，可仅保留[push]

jobs:
  build-and-cross-compile:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装MinGW交叉编译依赖（核心）
      - name: Install MinGW-w64 dependencies
        run: |
          sudo apt update -y
          sudo apt install -y mingw-w64 gcc-mingw-w64-x86-64

      # 配置Rust环境，添加Windows-GNU编译目标
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu
          components: rustfmt, clippy # 可选，代码格式化/检查工具

      # 显示Rust版本和目标，便于排查
      - name: Show Rust info
        run: |
          rustc --version
          cargo --version
          rustup target list --installed

      # Ubuntu原生构建（保留原逻辑）
      - name: Build (Ubuntu native)
        run: cargo build --verbose

      # Ubuntu原生测试（保留原逻辑）
      - name: Run tests
        run: cargo test --verbose

      # MinGW交叉编译Windows 64位Release版EXE
      - name: Cross build Windows 64bit EXE (MinGW)
        run: cargo build --release --target x86_64-pc-windows-gnu

      # 上传Windows EXE到Artifact（Action页面登录后可下载）
      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-exe-mingw # 产物名称，易识别
          path: target/x86_64-pc-windows-gnu/release/*.exe # MinGW产物固定路径
          retention-days: 14 # 产物保留14天，范围1-90
          if-no-files-found: error # 无EXE文件则直接报错，快速定位问题
          compression-level: 6 # 压缩级别，平衡速度和体积